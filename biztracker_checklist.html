
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1.5rem 0}
.phase{margin-bottom:2rem}
.phase-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.phase-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.phase-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.phase-sub{font-size:13px;color:var(--color-text-secondary);margin-left:auto}
.items{display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;transition:background 0.15s}
.item:hover{background:var(--color-background-secondary)}
.item.done{opacity:0.55}
.item.done .item-text{text-decoration:line-through}
.checkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.item.done .checkbox{background:#1D9E75;border-color:#1D9E75}
.check-icon{color:#fff;font-size:12px;display:none}
.item.done .check-icon{display:block}
.item-content{flex:1}
.item-text{font-size:14px;color:var(--color-text-primary);line-height:1.4}
.item-note{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);font-weight:500;flex-shrink:0;margin-top:1px}
.b-ai{background:#E1F5EE;color:#0F6E56}
.b-free{background:#EAF3DE;color:#3B6D11}
.b-key{background:#EEEDFE;color:#3C3489}
.b-warn{background:#FAEEDA;color:#854F0B}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:2rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.progress-wrap{margin-bottom:2rem}
.progress-label{display:flex;justify-content:space-between;font-size:13px;color:var(--color-text-secondary);margin-bottom:6px}
.progress-bar{height:6px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width 0.3s}
</style>
<div class="wrap">
<h2 class="sr-only">Чек-лист разработки приложения для учёта продаж</h2>

<div class="stats" id="stats">
<div class="stat"><div class="stat-label">Задач всего</div><div class="stat-val" id="total-val">0</div><div class="stat-sub">по всем фазам</div></div>
<div class="stat"><div class="stat-label">Выполнено</div><div class="stat-val" id="done-val">0</div><div class="stat-sub">отмечено</div></div>
<div class="stat"><div class="stat-label">Прогресс</div><div class="stat-val" id="pct-val">0%</div><div class="stat-sub">общий</div></div>
<div class="stat"><div class="stat-label">AdMob доход</div><div class="stat-val">$45</div><div class="stat-sub">при 1K DAU/мес</div></div>
</div>

<div class="progress-wrap">
<div class="progress-label"><span>Общий прогресс</span><span id="pct-label">0%</span></div>
<div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div id="phases"></div>
</div>

<script>
const phases = [
  {
    num:"1",color:"#E1F5EE",textColor:"#0F6E56",title:"Исследование и позиционирование",sub:"1–2 дня",
    items:[
      {text:"Скачать и протестировать Daily Sales Record",note:"Главный конкурент — выписать слабые места",badge:null},
      {text:"Изучить 1Мой склад и МойСклад (русский рынок)",note:"Что есть бесплатно, где боль пользователей",badge:null},
      {text:"Определить целевого пользователя",note:"Базарный торговец? Онлайн-продавец? Мелкий магазин?",badge:"b-key"},
      {text:"Выбрать 3 уникальных фичи vs конкуренты",note:"AI-совет + локализация ЦА + офлайн — это сильная связка",badge:"b-key"},
      {text:"Выбрать язык разработки",note:"React Native (один код iOS+Android) или Flutter",badge:null},
    ]
  },
  {
    num:"2",color:"#EEEDFE",textColor:"#3C3489",title:"MVP — ядро приложения",sub:"2–3 недели",
    items:[
      {text:"Добавление товара: название, цена закупки, цена продажи",note:"Основа всего — без этого ничего не работает",badge:"b-key"},
      {text:"Запись продажи в 1 тап",note:"Выбрал товар → количество → сохранил. Максимум 3 нажатия",badge:"b-key"},
      {text:"Автоматический расчёт прибыли",note:"(цена продажи − закупка) × кол-во",badge:null},
      {text:"Остаток товара на складе",note:"Вычитать при каждой продаже, предупреждать при низком остатке",badge:null},
      {text:"Дневной/недельный/месячный отчёт",note:"Простые цифры: продано, выручка, прибыль",badge:null},
      {text:"Полный офлайн-режим",note:"SQLite локально, синхронизация при наличии интернета",badge:"b-key"},
      {text:"Экспорт в Excel/PDF",note:"Многие предприниматели сдают отчёт бухгалтеру",badge:null},
    ]
  },
  {
    num:"3",color:"#FAEEDA",textColor:"#854F0B",title:"AI-интеграция (бесплатные API)",sub:"1 неделя",
    items:[
      {text:"Подключить Gemini Flash API (бесплатный tier)",note:"1500 запросов/день бесплатно — хватит для старта",badge:"b-ai"},
      {text:"AI-совет дня",note:"«Ваш самый прибыльный товар — X. Рекомендуем закупить больше»",badge:"b-ai"},
      {text:"Аномалии в продажах",note:"«Сегодня продажи на 40% ниже среднего — возможно причина Y»",badge:"b-ai"},
      {text:"Прогноз остатков",note:"«Через 5 дней закончится товар X при текущем темпе продаж»",badge:"b-ai"},
      {text:"Fallback на Groq Llama при превышении лимита",note:"Та же схема что в твоём Anki pipeline — уже умеешь",badge:"b-free"},
    ]
  },
  {
    num:"4",color:"#E6F1FB",textColor:"#0C447C",title:"Локализация под ЦА",sub:"3–5 дней",
    items:[
      {text:"Интерфейс: русский + узбекский + таджикский",note:"Это главное конкурентное преимущество",badge:"b-key"},
      {text:"Валюты: сомони, сум, тенге, сом",note:"Переключение в настройках",badge:null},
      {text:"Онбординг на местном языке",note:"Первый запуск — объяснить за 3 шага без технических слов",badge:null},
      {text:"Примеры товаров релевантные рынку",note:"Не «iPhone», а «мука 1кг», «помидоры», «носки оптом»",badge:null},
    ]
  },
  {
    num:"5",color:"#EAF3DE",textColor:"#3B6D11",title:"Монетизация AdMob",sub:"2–3 дня",
    items:[
      {text:"Зарегистрировать аккаунт AdMob",note:"Нужен Google Play аккаунт ($25 разово)",badge:"b-warn"},
      {text:"Banner внизу на экране отчётов",note:"Наименее раздражающий формат для бизнес-приложений",badge:null},
      {text:"Interstitial при экспорте PDF/Excel",note:"Пользователь нажал «экспорт» → показать рекламу 1 раз в сессию",badge:null},
      {text:"Rewarded ad за расширенную AI-аналитику",note:"«Смотри 30сек рекламу → получи детальный AI-отчёт» — лучший UX",badge:"b-ai"},
      {text:"Не показывать рекламу в критичных экранах",note:"Запись продажи, добавление товара — там нет рекламы",badge:null},
    ]
  },
  {
    num:"6",color:"#FCEBEB",textColor:"#791F1F",title:"Публикация и рост",sub:"1 неделя",
    items:[
      {text:"ASO: описание на 3 языках в Google Play",note:"Ключевые слова: учёт продаж, склад, прибыль, торговля",badge:null},
      {text:"Скриншоты приложения на русском",note:"Большинство ЦА разработчиков делают только английские",badge:"b-key"},
      {text:"Пост в Telegram каналах для предпринимателей ЦА",note:"Бесплатный маркетинг — там сотни тысяч аудитории",badge:"b-free"},
      {text:"Сбор отзывов первых 50 пользователей",note:"Форма обратной связи прямо в приложении",badge:null},
      {text:"Firebase Analytics для отслеживания воронки",note:"Что делают пользователи, где уходят",badge:"b-free"},
    ]
  }
];

const container = document.getElementById('phases');
let totalItems = 0;
let doneItems = 0;

phases.forEach((ph,pi)=>{
  totalItems += ph.items.length;
  const div = document.createElement('div');
  div.className = 'phase';
  div.innerHTML = `
    <div class="phase-header">
      <div class="phase-num" style="background:${ph.color};color:${ph.textColor}">${ph.num}</div>
      <span class="phase-title">${ph.title}</span>
      <span class="phase-sub">${ph.sub}</span>
    </div>
    <div class="items">
      ${ph.items.map((it,ii)=>`
        <div class="item" data-pi="${pi}" data-ii="${ii}" onclick="toggle(this)">
          <div class="checkbox"><i class="ti ti-check check-icon" aria-hidden="true"></i></div>
          <div class="item-content">
            <div class="item-text">${it.text}</div>
            ${it.note?`<div class="item-note">${it.note}</div>`:''}
          </div>
          ${it.badge?`<span class="badge ${it.badge}">${it.badge==='b-ai'?'AI':it.badge==='b-free'?'бесплатно':it.badge==='b-key'?'ключевое':'внимание'}</span>`:''}
        </div>
      `).join('')}
    </div>
  `;
  container.appendChild(div);
});

document.getElementById('total-val').textContent = totalItems;
updateStats();

function toggle(el){
  el.classList.toggle('done');
  updateStats();
}

function updateStats(){
  doneItems = document.querySelectorAll('.item.done').length;
  const pct = totalItems > 0 ? Math.round(doneItems/totalItems*100) : 0;
  document.getElementById('done-val').textContent = doneItems;
  document.getElementById('pct-val').textContent = pct + '%';
  document.getElementById('pct-label').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}
</script>
